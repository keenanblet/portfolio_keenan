<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="text-white h-screen overflow-hidden bg-gradient-to-br from-gray-900 via-gray-1000 to-slate-900">

    <!-- NAVBAR -->
    <div class="fixed top-4 left-0 right-0 flex justify-center z-50">
      <nav class="relative flex justify-center py-4 px-10 bg-white/5 backdrop-blur-xl border border-white/10 text-white items-center w-full max-w-2xl rounded-full shadow-lg">
        <div class="flex gap-4 space-x-4">
          <a href="index.html">Accueil</a>
          <a href="skills.html" class="px-4">compétences</a>
          <a href="project.html" class="px-4">projets</a>
          <a href="contact.html">Me contacter</a>
        </div>


      </nav>
    </div>

    <main class="pt-16 px-8 h-full flex flex-col justify-center items-center text-center">
        <h1 class="text-5xl font-bold mb-4">Me contacter</h1>
        <p class="text-gray-400 text-sm mb-12">Une question, une opportunité ? Écris-moi directement.</p>

        <!-- Formulaire -->
        <div class="w-full max-w-lg p-8 rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 flex flex-col gap-4">

            <input id="nom" type="text" placeholder="Votre nom"
                class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:border-white/30 transition">

            <input id="sujet" type="text" placeholder="Sujet"
                class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:border-white/30 transition">

            <textarea id="message" rows="5" placeholder="Votre message"
                class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:border-white/30 transition resize-none"></textarea>

            <button onclick="envoyerMail()"
                class="w-full py-3 bg-white text-black font-semibold rounded-full hover:bg-gray-200 transition">
                Envoyer →
            </button>

        </div>

        <a href="projects.html" class="mt-8 px-8 py-3 bg-white/5 backdrop-blur-xl border border-white/10 text-white font-semibold rounded-full hover:bg-gray-200 hover:text-black transition">
            ← Mes projets
        </a>
    </main>

    <script>
        function envoyerMail() {
            const nom = document.getElementById('nom').value
            const sujet = document.getElementById('sujet').value
            const message = document.getElementById('message').value
            window.location.href = `mailto:keenan.blet1@gmail.com?subject=${sujet} - ${nom}&body=${message}`
        }
    </script>

</body>
</html>
